name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK for Release
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/AniStream-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/AniStream-${{ github.ref_name }}.apk
          name: AniStream ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## AniStream ${{ github.ref_name }}
            
            ### Installation Instructions:
            1. **Uninstall** any previous version of AniStream from your phone.
            2. Download and install the `AniStream-${{ github.ref_name }}.apk` below.
            
            *Note: This is a debug-signed APK. If you get a "Blocked by Play Protect" warning, click "Install anyway".*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
